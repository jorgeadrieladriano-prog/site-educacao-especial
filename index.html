<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Portal Educacional Inclusivo</title>

  <style>
    body { font-family: Arial; background: #e3f2fd; margin: 0; }
    .header { background:#2196f3; color:#fff; padding:15px; text-align:center; font-weight:bold; }

    .banner { width:100%; height:100vh; object-fit:cover; }

    .login-popup {
      position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);
      background:white; padding:20px; border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.2); width:280px;
    }

    .container { padding:15px; }
    .card { background:#fff; padding:15px; border-radius:20px; margin-bottom:15px; }

    .btn { padding:12px; border:none; border-radius:12px; width:100%; margin-top:8px; }
    .primary{ background:#4caf50; color:#fff; }
    .secondary{ background:#ff9800; color:#fff; }

    input { width:100%; padding:10px; margin:5px 0; border-radius:10px; border:1px solid #ccc; }
  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

<div class="header">📚 Portal Educacional</div>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB62sPHJ7TxqSAD0PXHHOktfQfs0Sv8FWs",
  authDomain: "portal-educacao-635cd.firebaseapp.com",
  projectId: "portal-educacao-635cd",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let tela = "login";
let tipoUsuario = null;

function login(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  auth.signInWithEmailAndPassword(email, senha)
    .then(()=>{
      tela = "home";
      render();
    })
    .catch(e=>alert(e.message));
}

function cadastrar(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if(senha.length < 8){
    alert("Senha mínima de 8 caracteres"); return;
  }

  auth.createUserWithEmailAndPassword(email, senha)
    .then(()=>{
      alert("Usuário criado!");
    })
    .catch(e=>alert(e.message));
}

function recuperarSenha(){
  const email = document.getElementById("emailRec").value;

  auth.sendPasswordResetEmail(email)
    .then(()=>alert("Email de recuperação enviado!"))
    .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut().then(()=>{
    tela = "login";
    render();
  });
}

auth.onAuthStateChanged(async user=>{
  if(user){
    const email = user.email;

    if(email === "prof@escola.com"){
      tipoUsuario = "prof";
    } else {
      tipoUsuario = "aluno";
    }

    tela="home";
  } else {
    tela="login";
  }
  render();
});

function render(){
  const app = document.getElementById("app");

  if(tela === "login"){
    app.innerHTML = `
      <div style="position:relative">
        <img class="banner" src="https://images.unsplash.com/photo-1588072432836-e10032774350">

        <div class="login-popup">
          <h3>🔐 Login</h3>
          <input id="email" placeholder="Email">
          <input id="senha" type="password" placeholder="Senha">
          <button class="btn primary" onclick="login()">Entrar</button>
          <button class="btn secondary" onclick="cadastrar()">Cadastrar</button>
          <button class="btn" onclick="tela='recuperar'; render()">Esqueci a senha</button>
        </div>
      </div>
    `;
    return;
  }

  if(tela === "recuperar"){
    app.innerHTML = `
      <div class="container">
        <div class="card">
          <h2>📧 Recuperar senha</h2>
          <input id="emailRec" placeholder="Digite seu email">
          <button class="btn primary" onclick="recuperarSenha()">Enviar email</button>
          <button class="btn secondary" onclick="tela='login'; render()">Voltar</button>
        </div>
      </div>
    `;
    return;
  }

  if(tela === "home"){

    if(tipoUsuario === "prof"){
      app.innerHTML = `
        <div class="container">
          <button class="btn secondary" onclick="logout()">🚪 Sair</button>
          <div class="card">
            <h2>👩‍🏫 Área do Professor</h2>
            <p>Gerenciar alunos, materiais e progresso</p>
          </div>
        </div>
      `;
      return;
    }

    if(tipoUsuario === "aluno"){
      app.innerHTML = `
        <div class="container">
          <button class="btn secondary" onclick="logout()">🚪 Sair</button>
          <div class="card">
            <h2>👨‍👩‍👧 Área da Família</h2>
            <p>Acompanhar atividades e progresso</p>
          </div>
        </div>
      `;
      return;
    }

  }
}
</script>

</body>
</html>
