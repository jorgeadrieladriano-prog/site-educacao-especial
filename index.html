<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Escolar Completo</title>

<style>
body{font-family:Arial;margin:0;background:#e3f2fd}
.header{background:#1976d2;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:15px;margin-bottom:15px}
.btn{padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px;cursor:pointer}
.primary{background:#4caf50;color:#fff}
.secondary{background:#ff9800;color:#fff}
.tab{display:inline-block;padding:10px;background:#ccc;margin-right:5px;border-radius:10px;cursor:pointer}
.active{background:#1976d2;color:#fff}
input,textarea{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="header">🏫 Portal Escolar Completo</div>
<div id="app"></div>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyB62sPHJ7TxqSAD0PXHHOktfQfs0Sv8FWs",
 authDomain: "portal-educacao-635cd.firebaseapp.com",
 projectId: "portal-educacao-635cd",
 storageBucket: "portal-educacao-635cd.appspot.com",
 messagingSenderId: "67969011586",
 appId: "1:67969011586:web:26e169d4f5eefd2dfb099b"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let usuario=null;
let tipoUsuario=null;
let aba="dashboard";
let usuarios=[];
let usuarioSelecionado=null;

// LOGIN
function login(){
 auth.signInWithEmailAndPassword(user.value, pass.value)
 .catch(e=>alert(e.message));
}

// REGISTRO AUTOMÁTICO
async function registrar(){
 try{
  const cred = await auth.createUserWithEmailAndPassword(user.value, pass.value);

  const adminCheck = await db.collection("usuarios").where("tipo","==","admin").get();
  const tipo = adminCheck.empty ? "admin" : "aluno";

  await db.collection("usuarios").doc(cred.user.uid).set({
   email:user.value,
   tipo:tipo
  });

  alert("Conta criada como: " + tipo);

 }catch(e){
  alert(e.message);
 }
}

// LOGOUT
function logout(){
 auth.signOut();
}

// CARREGAR USUÁRIOS
async function carregarUsuarios(){
 const snap = await db.collection("usuarios").get();
 usuarios = snap.docs.map(d=>({id:d.id,...d.data()}));
}

// ADMIN CRIA USUÁRIO
async function criarUsuarioAdmin(tipo){
 try{
  const email = prompt("Email:");
  const senha = prompt("Senha (mínimo 8 caracteres):");

  if(!email || !senha) return alert("Preencha tudo");

  const cred = await auth.createUserWithEmailAndPassword(email, senha);

  await db.collection("usuarios").doc(cred.user.uid).set({
   email,
   tipo
  });

  alert(tipo + " criado");

  await auth.signOut();
  alert("Faça login novamente como admin");

 }catch(e){
  alert(e.message);
 }
}

// UPLOAD
async function uploadMaterial(){
 if(!usuarioSelecionado) return alert("Selecione um usuário");

 const file = arquivo.files[0];
 const ref = storage.ref("materiais/"+usuarioSelecionado+"/"+file.name);
 await ref.put(file);

 const url = await ref.getDownloadURL();

 await db.collection("materiais").add({
  usuarioId: usuarioSelecionado,
  nome:file.name,
  url
 });

 alert("Material enviado");
}

// PROGRESSO
async function salvarProgresso(){
 await db.collection("progresso").add({
  usuarioId: usuarioSelecionado,
  texto: progresso.value,
  data:new Date()
 });
 alert("Salvo");
}

// ABAS
function trocarAba(nova){
 aba=nova;
 render();
}

function tabs(){
 return `
 <span class='tab ${aba=="dashboard"?"active":""}' onclick="trocarAba('dashboard')">Dashboard</span>
 <span class='tab ${aba=="usuarios"?"active":""}' onclick="trocarAba('usuarios')">Usuários</span>
 <span class='tab ${aba=="materiais"?"active":""}' onclick="trocarAba('materiais')">Materiais</span>
 <span class='tab ${aba=="progresso"?"active":""}' onclick="trocarAba('progresso')">Progresso</span>
 `;
}

// DASHBOARD
async function dashboard(){
 const prog = await db.collection("progresso").get();
 return `<div class='card'>
 <h3>Total registros: ${prog.size}</h3>
 <canvas id='grafico'></canvas>
 </div>`;
}

// RENDER
async function render(){
 const app=document.getElementById("app");

 if(!usuario){
 app.innerHTML=`
 <div class='container'>
 <div class='card'>
 <h2>Login / Cadastro</h2>
 <input id='user' placeholder='Email'>
 <input id='pass' type='password' placeholder='Senha'>
 <button class='btn primary' onclick='login()'>Entrar</button>
 <button class='btn secondary' onclick='registrar()'>Criar Conta</button>
 </div>
 </div>`;
 return;
 }

 if(tipoUsuario==="admin" || tipoUsuario==="professor"){
 await carregarUsuarios();

 let conteudo="";

 if(aba==="dashboard"){
 conteudo=await dashboard();
 }

 if(aba==="usuarios"){
 conteudo=`
 <div class='card'>
 <h3>Criar usuário</h3>
 <button class='btn primary' onclick="criarUsuarioAdmin('aluno')">Criar Aluno</button>
 <button class='btn secondary' onclick="criarUsuarioAdmin('professor')">Criar Professor</button>
 </div>

 ${usuarios.map(u=>`
 <div class='card'>
 ${u.email} (${u.tipo})
 <button class='btn secondary' onclick="usuarioSelecionado='${u.id}'">Selecionar</button>
 </div>
 `).join("")}
 `;
 }

 if(aba==="materiais"){
 conteudo=usuarioSelecionado?`
 <div class='card'>
 <input type='file' id='arquivo'>
 <button class='btn primary' onclick='uploadMaterial()'>Enviar</button>
 </div>`:"Selecione usuário";
 }

 if(aba==="progresso"){
 conteudo=`
 <div class='card'>
 <textarea id='progresso'></textarea>
 <button class='btn primary' onclick='salvarProgresso()'>Salvar</button>
 </div>`;
 }

 app.innerHTML=`
 <div class='container'>
 <button class='btn secondary' onclick='logout()'>Sair</button>
 ${tabs()}
 ${conteudo}
 </div>`;

 if(aba==="dashboard"){
 const prog=await db.collection("progresso").get();
 new Chart(document.getElementById("grafico"),{
 type:"bar",
 data:{labels:["Progresso"],datasets:[{data:[prog.size]}]}
 });
 }
 }

 if(tipoUsuario==="aluno"){
 app.innerHTML=`
 <div class='container'>
 <button class='btn secondary' onclick='logout()'>Sair</button>
 <div class='card'>Área do aluno</div>
 </div>`;
 }
}

// AUTH
auth.onAuthStateChanged(async u=>{
 if(u){
  usuario=u;

  const doc=await db.collection("usuarios").doc(u.uid).get();

  if(doc.exists){
   tipoUsuario=doc.data().tipo;
  }

 }else{
  usuario=null;
  tipoUsuario=null;
 }

 render();
});

render();
</script>

</body>
</html>
