<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Escolar Profissional</title>

<style>
body{font-family:Arial;margin:0;background:#e3f2fd}
.header{background:#1976d2;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:15px;margin-bottom:15px}
.btn{padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px;cursor:pointer}
.primary{background:#4caf50;color:#fff}
.secondary{background:#ff9800;color:#fff}
.tab{display:inline-block;padding:10px;background:#ccc;margin-right:5px;border-radius:10px;cursor:pointer}
.active{background:#1976d2;color:#fff}
input,textarea{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="header">🏫 Portal Escolar Profissional</div>
<div id="app"></div>

<script>
const firebaseConfig={
 apiKey:"SUA_API_KEY",
 authDomain:"SEU_DOMINIO",
 projectId:"SEU_PROJETO",
 storageBucket:"SEU_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let usuario=null;
let tipoUsuario=null;
let aba="dashboard";
let alunos=[];
let alunoSelecionado=null;

function login(){
 auth.signInWithEmailAndPassword(user.value,pass.value)
 .catch(e=>alert(e.message));
}

function logout(){
 auth.signOut();
}

async function carregarAlunos(){
 const snap=await db.collection("usuarios").where("tipo","==","aluno").get();
 alunos=snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function cadastrarAluno(){
 try{
  const senhaPadrao="12345678";

  const cred=await auth.createUserWithEmailAndPassword(loginAluno.value,senhaPadrao);

  await db.collection("usuarios").doc(cred.user.uid).set({
   nome:nomeAluno.value,
   classe:classeAluno.value,
   email:loginAluno.value,
   tipo:"aluno",
   primeiroLogin:true
  });

  alert("Aluno cadastrado com senha padrão: 12345678");

  await auth.signOut();

 }catch(e){
  alert(e.message);
 }
}

async function salvarProgresso(){
 if(!alunoSelecionado) return alert("Selecione um aluno");

 await db.collection("progresso").add({
  alunoId:alunoSelecionado,
  texto:progresso.value,
  data:new Date()
 });

 alert("Progresso salvo");
}

async function uploadMaterial(){
 if(!alunoSelecionado) return alert("Selecione um aluno");

 const file=arquivo.files[0];
 if(!file) return alert("Escolha um arquivo");

 const ref=storage.ref("materiais/"+alunoSelecionado+"/"+file.name);
 await ref.put(file);

 const url=await ref.getDownloadURL();

 await db.collection("materiais").add({
  alunoId:alunoSelecionado,
  nome:file.name,
  url
 });

 alert("Material enviado");
}

function trocarAba(nova){
 aba=nova;
 render();
}

function renderTabs(){
 return `
 <div>
 <span class='tab ${aba=="dashboard"?"active":""}' onclick="trocarAba('dashboard')">📊 Dashboard</span>
 <span class='tab ${aba=="alunos"?"active":""}' onclick="trocarAba('alunos')">👨‍🎓 Alunos</span>
 <span class='tab ${aba=="materiais"?"active":""}' onclick="trocarAba('materiais')">📂 Materiais</span>
 <span class='tab ${aba=="progresso"?"active":""}' onclick="trocarAba('progresso')">📊 Progresso</span>
 </div>`;
}

async function renderDashboard(){
 const snap=await db.collection("progresso").get();
 const total=snap.size;

 return `
 <div class='card'>
 <h3>Total de registros: ${total}</h3>
 <canvas id='grafico'></canvas>
 </div>`;
}

async function render(){
 const app=document.getElementById("app");

 if(!usuario){
 app.innerHTML=`
 <div class='container'>
 <div class='card'>
 <h2>Login</h2>
 <input id='user' placeholder='Email'>
 <input id='pass' type='password' placeholder='Senha'>
 <button class='btn primary' onclick='login()'>Entrar</button>
 </div>
 </div>`;
 return;
}

 if(tipoUsuario==="prof"){

 await carregarAlunos();

 let conteudo="";

 if(aba==="dashboard"){
  conteudo=await renderDashboard();
 }

 if(aba==="alunos"){
  conteudo=`
  <div class='card'>
  <h3>Cadastrar aluno</h3>
  <input id='nomeAluno' placeholder='Nome'>
  <input id='classeAluno' placeholder='Turma'>
  <input id='loginAluno' placeholder='Email'>
  <button class='btn primary' onclick='cadastrarAluno()'>Cadastrar</button>
  </div>

  ${alunos.map(a=>`
   <div class='card'>
   ${a.nome} - ${a.classe}
   <button class='btn secondary' onclick="alunoSelecionado='${a.id}';alert('Aluno selecionado')">Selecionar</button>
   </div>
  `).join("")}
  `;
 }

 if(aba==="materiais"){
  conteudo=alunoSelecionado?`
  <div class='card'>
  <input type='file' id='arquivo'>
  <button class='btn primary' onclick='uploadMaterial()'>Enviar Material</button>
  </div>
  `:"<div class='card'>Selecione um aluno</div>";
 }

 if(aba==="progresso"){
  conteudo=alunoSelecionado?`
  <div class='card'>
  <textarea id='progresso' placeholder='Descreva o progresso'></textarea>
  <button class='btn primary' onclick='salvarProgresso()'>Salvar</button>
  </div>
  `:"<div class='card'>Selecione um aluno</div>";
 }

 app.innerHTML=`
 <div class='container'>
 <button class='btn secondary' onclick='logout()'>Sair</button>
 ${renderTabs()}
 ${conteudo}
 </div>`;

 if(aba==="dashboard"){
  const snap=await db.collection("progresso").get();
  const total=snap.size;

  new Chart(document.getElementById('grafico'),{
   type:'bar',
   data:{
    labels:['Registros'],
    datasets:[{label:'Progresso',data:[total]}]
   }
  });
 }
 }

 if(tipoUsuario==="aluno"){
  app.innerHTML=`
  <div class='container'>
  <button class='btn secondary' onclick='logout()'>Sair</button>
  <div class='card'>
  <h2>Área do Aluno</h2>
  <p>Bem-vindo!</p>
  </div>
  </div>`;
 }
}

auth.onAuthStateChanged(async u=>{
 if(u){
  usuario=u;

  const doc=await db.collection("usuarios").doc(u.uid).get();

  if(doc.exists){
   tipoUsuario=doc.data().tipo;
  }else{
   tipoUsuario="aluno";
  }

 }else{
  usuario=null;
  tipoUsuario=null;
 }

 render();
});

render();
</script>

</body>
</html>
