<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Escolar Profissional</title>

<style>
body{font-family:Arial;margin:0;background:#e3f2fd}
.header{background:#1976d2;color:#fff;padding:15px;text-align:center}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:15px;margin-bottom:15px}
.btn{padding:10px;border:none;border-radius:10px;width:100%;margin-top:5px}
.primary{background:#4caf50;color:#fff}
.secondary{background:#ff9800;color:#fff}
.tab{display:inline-block;padding:10px;background:#ccc;margin-right:5px;border-radius:10px;cursor:pointer}
.active{background:#1976d2;color:#fff}
input,textarea{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
img.avatar{width:80px;height:80px;border-radius:50%}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="header">🏫 Portal Escolar Profissional</div>
<div id="app"></div>

<script>
const firebaseConfig={
 apiKey:"AIzaSyB62sPHJ7TxqSAD0PXHHOktfQfs0Sv8FWs",
 authDomain:"portal-educacao-635cd.firebaseapp.com",
 projectId:"portal-educacao-635cd",
 storageBucket:"portal-educacao-635cd.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let usuario=null;
let tipoUsuario=null;
let aba="dashboard";
let alunos=[];
let alunoSelecionado=null;

function login(){
 auth.signInWithEmailAndPassword(user.value,pass.value)
 .catch(e=>alert(e.message));
}

function logout(){auth.signOut();}

async function carregarAlunos(){
 const snap=await db.collection("usuarios").where("tipo","==","aluno").get();
 alunos=snap.docs.map(d=>({id:d.id,...d.data()}));
}

async function cadastrarAluno(){
 const cred=await auth.createUserWithEmailAndPassword(loginAluno.value,"12345678");
 await db.collection("usuarios").doc(cred.user.uid).set({
  nome:nomeAluno.value,
  classe:classeAluno.value,
  email:loginAluno.value,
  tipo:"aluno"
 });
 alert("Aluno cadastrado");
}

async function salvarProgresso(){
 await db.collection("progresso").add({
  alunoId:alunoSelecionado,
  texto:progresso.value,
  data:new Date()
 });
 alert("Salvo");
}

async function uploadMaterial(){
 const file=arquivo.files[0];
 const ref=storage.ref("materiais/"+alunoSelecionado+"/"+file.name);
 await ref.put(file);
 const url=await ref.getDownloadURL();
 await db.collection("materiais").add({alunoId:alunoSelecionado,nome:file.name,url});
 alert("Enviado");
}

function renderTabs(){
 return `
 <div>
 <span class='tab ${aba=="dashboard"?"active":""}' onclick="trocarAba('dashboard')">📊 Dashboard</span>
 <span class='tab ${aba=="alunos"?"active":""}' onclick="trocarAba('alunos')">👨‍🎓 Alunos</span>
 <span class='tab ${aba=="materiais"?"active":""}' onclick="trocarAba('materiais')">📂 Materiais</span>
 <span class='tab ${aba=="progresso"?"active":""}' onclick="trocarAba('progresso')">📊 Progresso</span>
 </div>`;
}

function trocarAba(nova){
 aba=nova;
 render();
}

async function renderDashboard(){
 const snap=await db.collection("progresso").get();
 const total=snap.size;

 return `<div class='card'>
 <h3>Registros de progresso</h3>
 <canvas id='grafico'></canvas>
 </div>`;
}

async function render(){
 const app=document.getElementById("app");

 if(!usuario){
 app.innerHTML=`
 <div class='container'>
 <input id='user' placeholder='Email'>
 <input id='pass' type='password' placeholder='Senha'>
 <button class='btn primary' onclick='login()'>Entrar</button>
 </div>`;
 return;
 }

 if(tipoUsuario==="prof"){
 await carregarAlunos();

 let conteudo="";

 if(aba==="dashboard"){
 conteudo=await renderDashboard();
 }

 if(aba==="alunos"){
 conteudo=`
 <div class='card'>
 <input id='nomeAluno' placeholder='Nome'>
 <input id='classeAluno' placeholder='Turma'>
 <input id='loginAluno' placeholder='Email'>
 <button class='btn primary' onclick='cadastrarAluno()'>Cadastrar</button>
 </div>
 ${alunos.map(a=>`<div class='card'>
 ${a.nome} - ${a.classe}
 <button class='btn secondary' onclick="alunoSelecionado='${a.id}'">Selecionar</button>
 </div>`).join("")}`;
 }

 if(aba==="materiais"){
 conteudo=alunoSelecionado?`
 <div class='card'>
 <input type='file' id='arquivo'>
 <button class='btn primary' onclick='uploadMaterial()'>Enviar</button>
 </div>`:"<div class='card'>Selecione um aluno</div>";
 }

 if(aba==="progresso"){
 conteudo=alunoSelecionado?`
 <div class='card'>
 <textarea id='progresso'></textarea>
 <button class='btn primary' onclick='salvarProgresso()'>Salvar</button>
 </div>`:"<div class='card'>Selecione um aluno</div>";
 }

 app.innerHTML=`
 <div class='container'>
 <button class='btn secondary' onclick='logout()'>Sair</button>
 ${renderTabs()}
 ${conteudo}
 </div>`;

 if(aba==="dashboard"){
 const snap=await db.collection("progresso").get();
 const total=snap.size;
 new Chart(document.getElementById('grafico'),{
 type:'bar',
 data:{labels:['Progresso'],datasets:[{data:[total]}]}
 });
 }
 }
}

auth.onAuthStateChanged(async u=>{
 if(u){
 usuario=u;
 const doc=await db.collection("usuarios").doc(u.uid).get();
 tipoUsuario=doc.data()?.tipo||"aluno";
 }else usuario=null;
 render();
});
</script>

</body>
</html>
