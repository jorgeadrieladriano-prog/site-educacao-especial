<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Escolar PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f7fb}
.header{background:#1976d2;color:#fff;padding:15px;text-align:center;font-size:20px}
.layout{display:flex;height:100vh}
.sidebar{
 width:220px;background:#1e293b;color:#fff;padding:15px;
 display:flex;flex-direction:column
}
.sidebar button{
 background:none;border:none;color:#fff;text-align:left;
 padding:10px;margin:5px 0;border-radius:8px;cursor:pointer
}
.sidebar button:hover{background:#334155}
.content{flex:1;padding:20px;overflow:auto}
.card{
 background:#fff;padding:15px;border-radius:12px;
 margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)
}
input,textarea{
 width:100%;padding:10px;margin-top:5px;
 border-radius:8px;border:1px solid #ccc
}
.btn{
 padding:10px;border:none;border-radius:8px;
 cursor:pointer;margin-top:10px
}
.primary{background:#22c55e;color:#fff}
.secondary{background:#f59e0b;color:#fff}
.danger{background:#ef4444;color:#fff}

.loader{
 display:flex;justify-content:center;align-items:center;height:100vh;
 font-size:20px
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="app"></div>

<script>
// CONFIG
const firebaseConfig = {
 apiKey: "SUA_API_KEY",
 authDomain: "SEU_DOMINIO",
 projectId: "SEU_PROJECT_ID",
 storageBucket: "SEU_BUCKET",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// STATE
let usuario=null;
let tipoUsuario=null;
let aba="dashboard";
let usuarios=[];
let selecionado=null;
let loading=true;

// LOADING UI
function telaLoading(){
 return `<div class="loader">🔄 Carregando...</div>`;
}

// LOGIN
function telaLogin(){
 return `
 <div style="padding:30px">
 <div class="card">
 <h2>Login</h2>
 <input id="email" placeholder="Email">
 <input id="senha" type="password" placeholder="Senha">
 <button class="btn primary" onclick="login()">Entrar</button>
 <button class="btn secondary" onclick="registrar()">Criar Conta</button>
 </div>
 </div>`;
}

// LOGIN FUNC
function login(){
 auth.signInWithEmailAndPassword(email.value, senha.value)
 .catch(e=>alert(e.message));
}

// REGISTRO
async function registrar(){
 try{
  const cred = await auth.createUserWithEmailAndPassword(email.value, senha.value);

  const adminCheck = await db.collection("usuarios").where("tipo","==","admin").get();
  const tipo = adminCheck.empty ? "admin" : "aluno";

  await db.collection("usuarios").doc(cred.user.uid).set({
   email:email.value,
   tipo
  });

  tipoUsuario = tipo;
  usuario = cred.user;

  render();

 }catch(e){alert(e.message);}
}

// LOGOUT
function logout(){auth.signOut();}

// LOAD USERS
async function carregarUsuarios(){
 const snap = await db.collection("usuarios").get();
 usuarios = snap.docs.map(d=>({id:d.id,...d.data()}));
}

// CRIAR USER
async function criar(tipo){
 const email=prompt("Email:");
 const senha=prompt("Senha:");
 const cred=await auth.createUserWithEmailAndPassword(email,senha);

 await db.collection("usuarios").doc(cred.user.uid).set({email,tipo});

 alert("Criado!");

 await auth.signOut();
}

// DASHBOARD
async function dashboard(){
 const prog=await db.collection("progresso").get();
 return `
 <div class="card">
 <h3>Dashboard</h3>
 <canvas id="grafico"></canvas>
 </div>`;
}

// SIDEBAR
function menu(){
 return `
 <div class="sidebar">
 <h3>📘 Portal</h3>
 <button onclick="trocar('dashboard')">Dashboard</button>
 <button onclick="trocar('usuarios')">Usuários</button>
 <button onclick="trocar('materiais')">Materiais</button>
 <button onclick="trocar('progresso')">Progresso</button>
 <button onclick="logout()" class="danger">Sair</button>
 </div>`;
}

// TROCAR ABA
function trocar(n){
 aba=n;
 render();
}

// RENDER
async function render(){
 const app=document.getElementById("app");

 if(loading){
 app.innerHTML=telaLoading();
 return;
 }

 if(!usuario){
 app.innerHTML=telaLogin();
 return;
 }

 if(tipoUsuario==="admin" || tipoUsuario==="professor"){
 await carregarUsuarios();

 let conteudo="";

 if(aba==="dashboard"){
 conteudo=await dashboard();
 }

 if(aba==="usuarios"){
 conteudo=`
 <div class="card">
 <button class="btn primary" onclick="criar('aluno')">Criar Aluno</button>
 <button class="btn secondary" onclick="criar('professor')">Criar Professor</button>
 </div>
 ${usuarios.map(u=>`
 <div class="card">
 ${u.email} (${u.tipo})
 <button onclick="selecionado='${u.id}'">Selecionar</button>
 </div>`).join("")}`;
 }

 if(aba==="materiais"){
 conteudo=selecionado?`
 <div class="card">
 <input type="file" id="file">
 <button class="btn primary" onclick="upload()">Enviar</button>
 </div>`:"Selecione usuário";
 }

 if(aba==="progresso"){
 conteudo=`
 <div class="card">
 <textarea id="txt"></textarea>
 <button class="btn primary" onclick="salvar()">Salvar</button>
 </div>`;
 }

 app.innerHTML=`
 <div class="layout">
 ${menu()}
 <div class="content">${conteudo}</div>
 </div>`;

 if(aba==="dashboard"){
 const prog=await db.collection("progresso").get();
 new Chart(document.getElementById("grafico"),{
 type:"bar",
 data:{labels:["Progresso"],datasets:[{data:[prog.size]}]}
 });
 }
}

// UPLOAD
async function upload(){
 const file=document.getElementById("file").files[0];
 const ref=storage.ref("materiais/"+selecionado+"/"+file.name);
 await ref.put(file);
 alert("Enviado");
}

// PROGRESSO
async function salvar(){
 await db.collection("progresso").add({
  usuarioId:selecionado,
  texto:txt.value
 });
 alert("Salvo");
}

// AUTH
auth.onAuthStateChanged(async u=>{
 loading=true;
 render();

 if(u){
  usuario=u;
  const doc=await db.collection("usuarios").doc(u.uid).get();
  tipoUsuario=doc.exists ? doc.data().tipo : null;
 }else{
  usuario=null;
  tipoUsuario=null;
 }

 loading=false;
 render();
});
</script>

</body>
</html>
