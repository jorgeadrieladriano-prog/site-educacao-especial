<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Escolar SaaS</title>

<style>
body{
 font-family:Arial;
 margin:0;
 background-size:cover;
 background-position:center;
 background-repeat:no-repeat;
 transition:0.5s;
}

.overlay{
 background:rgba(0,0,0,0.6);
 min-height:100vh;
}

.header{
 background:rgba(30,136,229,0.9);
 color:#fff;
 padding:15px;
 text-align:center;
 font-size:20px;
}

.container{padding:15px}

.card{
 background:#fff;
 padding:15px;
 border-radius:12px;
 margin-bottom:15px;
 box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.btn{
 padding:10px;
 border:none;
 border-radius:8px;
 width:100%;
 margin-top:5px;
 cursor:pointer;
}

.primary{background:#4caf50;color:#fff}
.secondary{background:#ff9800;color:#fff}
.danger{background:#e53935;color:#fff}

.tab{
 display:inline-block;
 padding:10px;
 background:#ccc;
 margin-right:5px;
 border-radius:8px;
 cursor:pointer;
}

.active{background:#1e88e5;color:#fff}

input,textarea{
 width:100%;
 padding:8px;
 margin:5px 0;
 border-radius:8px;
 border:1px solid #ccc;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="overlay">
<div class="header">🏫 Portal Escolar SaaS</div>
<div id="app"></div>
</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig={
  apiKey: "AIzaSyB62sPHJ7TxqSAD0PXHHOktfQfs0Sv8FWs",
  authDomain: "portal-educacao-635cd.firebaseapp.com",
  projectId: "portal-educacao-635cd",
  storageBucket: "portal-educacao-635cd.firebasestorage.app",
  messagingSenderId: "67969011586",
  appId: "1:67969011586:web:26e169d4f5eefd2dfb099b",
  measurementId: "G-1SH0J24EG0"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let user=null;
let tipo=null;
let aba="dashboard";
let alunos=[];
let selecionado=null;

// 🎨 BACKGROUND
function mudarBackground(){
 if(!user){
  document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1588072432836-e10032774350')";
 }else if(tipo==="aluno"){
  document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1523240795612-9a054b0db644')";
 }else{
  document.body.style.backgroundImage="url('https://images.unsplash.com/photo-1577896851231-70ef18881754')";
 }
}

// LOGIN
function login(){
 auth.signInWithEmailAndPassword(email.value,senha.value)
 .catch(e=>alert(e.message));
}

// LOGOUT
function logout(){auth.signOut();}

// RESET SENHA
function mostrarReset(){
 app.innerHTML=`
 <div class="container">
  <div class="card">
   <h2>Recuperar senha</h2>
   <input id="resetEmail" placeholder="Email">
   <button class="btn primary" onclick="enviarReset()">Enviar</button>
   <button class="btn secondary" onclick="render()">Voltar</button>
  </div>
 </div>`;
}

function enviarReset(){
 auth.sendPasswordResetEmail(resetEmail.value)
 .then(()=>{alert("Email enviado");render();})
 .catch(e=>alert(e.message));
}

// CRIAR ADMIN
function registrar(){
 auth.createUserWithEmailAndPassword(email.value,senha.value)
 .then(async cred=>{
  await db.collection("usuarios").doc(cred.user.uid).set({
   tipo:"admin"
  });
 });
}

// CRIAR USUÁRIO
async function criarUsuario(tipoUser){
 const nome=prompt("Nome:");
 const emailU=prompt("Email:");

 const cred=await auth.createUserWithEmailAndPassword(emailU,"12345678");

 await db.collection("usuarios").doc(cred.user.uid).set({
  nome,
  email:emailU,
  tipo:tipoUser
 });

 alert(tipoUser+" criado");
}

// CARREGAR ALUNOS
async function carregarAlunos(){
 const snap=await db.collection("usuarios").where("tipo","==","aluno").get();
 alunos=snap.docs.map(d=>({id:d.id,...d.data()}));
}

// MATERIAL
async function adicionarMaterial(){
 const titulo=prompt("Título:");
 const link=prompt("Link:");

 await db.collection("materiais").add({
  titulo,
  link,
  alunoId:selecionado,
  criado:new Date()
 });

 alert("Material adicionado");
}

// REGISTRO DE ACESSO
async function abrirMaterial(id,link){
 await db.collection("progresso").add({
  alunoId:user.uid,
  materialId:id,
  acao:"acessou_material",
  data:new Date()
 });

 window.open(link,"_blank");
}

// MATERIAIS ALUNO
async function verMateriaisAluno(){
 const snap=await db.collection("materiais")
 .where("alunoId","==",user.uid).get();

 return snap.docs.map(doc=>{
  const m=doc.data();

  return `
  <div class="card">
   <b>${m.titulo}</b>
   <button class="btn primary"
   onclick="abrirMaterial('${doc.id}','${m.link}')">
   Abrir
   </button>
  </div>`;
 }).join("");
}

// ANALYTICS
async function gerarAnalytics(){
 const progressoSnap = await db.collection("progresso").get();
 let acessosPorAluno = {};

 progressoSnap.forEach(doc=>{
   const p = doc.data();
   acessosPorAluno[p.alunoId] = (acessosPorAluno[p.alunoId] || 0) + 1;
 });

 return Object.entries(acessosPorAluno)
 .sort((a,b)=>b[1]-a[1]);
}

// PROGRESSO DETALHADO
async function listarProgressoAluno(){
 const snap = await db.collection("progresso")
 .where("alunoId","==",selecionado)
 .orderBy("data","desc")
 .get();

 let ultimo = snap.docs[0];

 return `
 <div class="card">
   <b>Último acesso:</b><br>
   ${ultimo ? new Date(ultimo.data().data.seconds*1000).toLocaleString() : "Nenhum"}
 </div>
 ` + snap.docs.map(d=>{
   const p=d.data();
   return `
   <div class="card">
     ${p.acao}<br>
     ${new Date(p.data.seconds*1000).toLocaleString()}
   </div>`;
 }).join("");
}

// TABS
function tabs(){
 return `
 <div>
 <span class="tab ${aba=="dashboard"?"active":""}" onclick="trocar('dashboard')">📊</span>
 <span class="tab ${aba=="alunos"?"active":""}" onclick="trocar('alunos')">👨‍🎓</span>
 <span class="tab ${aba=="materiais"?"active":""}" onclick="trocar('materiais')">📂</span>
 <span class="tab ${aba=="progresso"?"active":""}" onclick="trocar('progresso')">📈</span>
 </div>`;
}

function trocar(n){aba=n;render();}

// RENDER
async function render(){

 if(!user){
 app.innerHTML=`
 <div class="container">
 <div class="card">
 <h2>Login</h2>
 <input id="email" placeholder="Email">
 <input id="senha" type="password" placeholder="Senha">
 <button class="btn primary" onclick="login()">Entrar</button>
 <button class="btn secondary" onclick="mostrarReset()">Esqueci senha</button>
 <button class="btn secondary" onclick="registrar()">Criar Admin</button>
 </div>
 </div>`;
 mudarBackground();
 return;
 }

 if(tipo==="aluno"){
 const materiais=await verMateriaisAluno();

 app.innerHTML=`
 <div class="container">
 <button class="btn danger" onclick="logout()">Sair</button>
 <div class="card">
 <h3>Seus materiais</h3>
 ${materiais}
 </div>
 </div>`;
 mudarBackground();
 return;
 }

 await carregarAlunos();

 let conteudo="";

 if(aba=="dashboard"){
 const ranking = await gerarAnalytics();

 conteudo=`
 <div class="card">
   <h3>📊 Ranking</h3>
   <canvas id="grafico"></canvas>
 </div>

 <div class="card">
   ${ranking.map(r=>`<div>${r[0]} - ${r[1]} acessos</div>`).join("")}
 </div>
 `;
 }

 if(aba=="alunos"){
 conteudo=`
 <div class="card">
 <button class="btn primary" onclick="criarUsuario('aluno')">+ Aluno</button>
 <button class="btn secondary" onclick="criarUsuario('professor')">+ Professor</button>
 </div>
 ${alunos.map(a=>`
 <div class="card">
 ${a.nome||"Sem nome"}
 <button class="btn secondary" onclick="selecionado='${a.id}'">Selecionar</button>
 </div>`).join("")}`;
 }

 if(aba=="materiais"){
 conteudo=selecionado?`
 <div class="card">
 <button class="btn primary" onclick="adicionarMaterial()">Adicionar material</button>
 </div>`:`<div class="card">Selecione aluno</div>`;
 }

 if(aba=="progresso"){
 conteudo=selecionado?`
 <div class="card">
 ${await listarProgressoAluno()}
 </div>`:`<div class="card">Selecione aluno</div>`;
 }

 app.innerHTML=`
 <div class="container">
 <button class="btn danger" onclick="logout()">Sair</button>
 ${tabs()}
 ${conteudo}
 </div>`;

 if(aba=="dashboard"){
 const ranking = await gerarAnalytics();

 new Chart(document.getElementById("grafico"),{
  type:"bar",
  data:{
   labels:ranking.map(r=>r[0].slice(0,6)),
   datasets:[{label:"Acessos",data:ranking.map(r=>r[1])}]
  }
 });
 }

 mudarBackground();
}

// AUTH
auth.onAuthStateChanged(async u=>{
 if(u){
  user=u;
  const doc=await db.collection("usuarios").doc(u.uid).get();
  tipo=doc.data()?.tipo || "aluno";
 }else{
  user=null;
  tipo=null;
 }
 render();
});

</script>

</body>
</html>
