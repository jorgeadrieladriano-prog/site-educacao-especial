<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Escolar SaaS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f1f5f9}
.layout{display:flex;height:100vh}
.sidebar{width:230px;background:#0f172a;color:#fff;padding:15px}
.sidebar h2{margin:0 0 10px}
.sidebar button{
 width:100%;padding:10px;margin:5px 0;border:none;
 background:#1e293b;color:#fff;border-radius:8px;cursor:pointer
}
.content{flex:1;padding:20px;overflow:auto}
.card{
 background:#fff;padding:15px;border-radius:10px;
 margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.1)
}
input,textarea{
 width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc
}
.btn{padding:10px;border:none;border-radius:8px;margin-top:5px;cursor:pointer}
.primary{background:#22c55e;color:#fff}
.secondary{background:#f59e0b;color:#fff}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="app"></div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyB62sPHJ7TxqSAD0PXHHOktfQfs0Sv8FWs",
  authDomain: "portal-educacao-635cd.firebaseapp.com",
  projectId: "portal-educacao-635cd",
  storageBucket: "portal-educacao-635cd.firebasestorage.app",
  messagingSenderId: "67969011586",
  appId: "1:67969011586:web:26e169d4f5eefd2dfb099b",
  measurementId: "G-1SH0J24EG0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// STATE
let usuario=null;
let tipo=null;
let aba="dashboard";
let usuarios=[];
let turmas=[];
let selecionado=null;

// LOGIN
function login(){
 auth.signInWithEmailAndPassword(email.value, senha.value)
 .catch(e=>alert(e.message));
}

// REGISTRO
async function registrar(){
 const cred = await auth.createUserWithEmailAndPassword(email.value, senha.value);

 const adminCheck = await db.collection("usuarios").where("tipo","==","admin").get();
 const tipoUser = adminCheck.empty ? "admin" : "aluno";

 await db.collection("usuarios").doc(cred.user.uid).set({
  email: email.value,
  tipo: tipoUser
 });
}

// MENU
function menu(){
 return `
 <div class="sidebar">
 <h2>🏫 SaaS</h2>
 <button onclick="trocar('dashboard')">Dashboard</button>
 <button onclick="trocar('turmas')">Turmas</button>
 <button onclick="trocar('usuarios')">Usuários</button>
 <button onclick="trocar('materiais')">Materiais</button>
 <button onclick="trocar('progresso')">Progresso</button>
 <button onclick="logout()">Sair</button>
 </div>`;
}

function logout(){auth.signOut();}
function trocar(n){aba=n; render();}

// LOAD
async function carregar(){
 const u = await db.collection("usuarios").get();
 usuarios = u.docs.map(d=>({id:d.id,...d.data()}));

 const t = await db.collection("turmas").get();
 turmas = t.docs.map(d=>({id:d.id,...d.data()}));
}

// CRIAR TURMA
async function criarTurma(){
 const nome = prompt("Nome da turma:");
 const prof = prompt("ID do professor:");

 await db.collection("turmas").add({
  nome,
  professorId: prof
 });

 alert("Turma criada!");
}

// CRIAR USUÁRIO
async function criar(tipoUser){
 const email = prompt("Email:");
 const senha = prompt("Senha:");

 const cred = await auth.createUserWithEmailAndPassword(email, senha);

 await db.collection("usuarios").doc(cred.user.uid).set({
  email,
  tipo: tipoUser
 });

 await auth.signOut();
}

// DASHBOARD
async function dashboard(){
 const prog = await db.collection("progresso").get();

 return `
 <div class="card">
 <h3>Total progresso: ${prog.size}</h3>
 <canvas id="grafico"></canvas>
 </div>`;
}

// RENDER
async function render(){
 const app = document.getElementById("app");

 if(!usuario){
 app.innerHTML=`
 <div style="padding:20px">
 <div class="card">
 <input id="email" placeholder="Email">
 <input id="senha" type="password" placeholder="Senha">
 <button class="btn primary" onclick="login()">Entrar</button>
 <button class="btn secondary" onclick="registrar()">Criar Conta</button>
 </div>
 </div>`;
 return;
 }

 await carregar();

 let conteudo="";

 if(aba==="dashboard") conteudo = await dashboard();

 if(aba==="turmas"){
 conteudo=`
 <div class="card">
 <button class="btn primary" onclick="criarTurma()">Criar Turma</button>
 </div>

 ${turmas.map(t=>`
 <div class="card">${t.nome}</div>
 `).join("")}`;
 }

 if(aba==="usuarios"){
 conteudo=`
 <div class="card">
 <button class="btn primary" onclick="criar('aluno')">Criar Aluno</button>
 <button class="btn secondary" onclick="criar('professor')">Criar Professor</button>
 </div>

 ${usuarios.map(u=>`
 <div class="card">
 ${u.email} (${u.tipo})
 <button onclick="selecionado='${u.id}'">Selecionar</button>
 </div>`).join("")}`;
 }

 if(aba==="materiais"){
 conteudo= selecionado ? `
 <div class="card">
 <input type="file" id="file">
 <button class="btn primary" onclick="upload()">Enviar</button>
 </div>`:"Selecione usuário";
 }

 if(aba==="progresso"){
 conteudo=`
 <div class="card">
 <textarea id="txt"></textarea>
 <button class="btn primary" onclick="salvar()">Salvar</button>
 </div>`;
 }

 app.innerHTML=`
 <div class="layout">
 ${menu()}
 <div class="content">${conteudo}</div>
 </div>`;

 if(aba==="dashboard"){
 const prog = await db.collection("progresso").get();

 new Chart(document.getElementById("grafico"),{
  type:"bar",
  data:{labels:["Progresso"],datasets:[{data:[prog.size]}]}
 });
 }
}

// UPLOAD
async function upload(){
 const file=fileInput.files[0];
 const ref=storage.ref("materiais/"+selecionado+"/"+file.name);
 await ref.put(file);
 alert("Enviado");
}

// PROGRESSO
async function salvar(){
 await db.collection("progresso").add({
  usuarioId: selecionado,
  texto: txt.value
 });
 alert("Salvo");
}

// AUTH
auth.onAuthStateChanged(async u=>{
 if(u){
  usuario=u;
  const doc = await db.collection("usuarios").doc(u.uid).get();
  tipo = doc.data()?.tipo;
 }else{
  usuario=null;
 }
 render();
});
</script>

</body>
</html>
