<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Educacional Completo</title>

<style>
body{font-family:Arial;margin:0;background:#e3f2fd}
.header{background:#2196f3;color:#fff;padding:15px;text-align:center;font-weight:bold}
.banner{width:100%;height:100vh;object-fit:cover}
.login-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:20px;width:280px}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:20px;margin-bottom:15px}
.btn{padding:12px;border:none;border-radius:12px;width:100%;margin-top:8px}
.primary{background:#4caf50;color:#fff}
.secondary{background:#ff9800;color:#fff}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ccc}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
</head>
<body>

<div class="header">📚 Portal Educacional</div>
<div id="app"></div>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyB62sPHJ7TxqSAD0PXHHOktfQfs0Sv8FWs",
 authDomain:"portal-educacao-635cd.firebaseapp.com",
 projectId:"portal-educacao-635cd",
 storageBucket:"portal-educacao-635cd.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let tela="login";
let tipoUsuario=null;
let usuario=null;
let precisaTrocarSenha=false;

function login(){
 auth.signInWithEmailAndPassword(user.value,pass.value)
 .catch(e=>alert(e.message));
}

function logout(){auth.signOut();}

function recuperarSenha(){
 auth.sendPasswordResetEmail(emailRec.value)
 .then(()=>alert("Email enviado"));
}

async function cadastrarAluno(){
 const nome=nomeAluno.value;
 const classe=classeAluno.value;
 const email=loginAluno.value;
 const senha="12345678";

 const cred=await auth.createUserWithEmailAndPassword(email,senha);

 await db.collection("usuarios").doc(cred.user.uid).set({
  nome,classe,email,tipo:"aluno",precisaTrocarSenha:true
 });

 alert("Aluno criado!");
}

async function salvarProgresso(){
 const texto=progresso.value;
 await db.collection("progresso").add({
  userId:usuario.uid,
  texto,
  data:new Date()
 });
 alert("Salvo!");
}

async function uploadMaterial(){
 const file=arquivo.files[0];
 const ref=storage.ref("materiais/"+usuario.uid+"/"+file.name);
 await ref.put(file);
 const url=await ref.getDownloadURL();

 await db.collection("materiais").add({
  userId:usuario.uid,
  nome:file.name,
  url
 });
 alert("Arquivo enviado!");
}

async function carregarDadosAluno(){
 const progSnap=await db.collection("progresso").where("userId","==",usuario.uid).get();
 const matSnap=await db.collection("materiais").where("userId","==",usuario.uid).get();

 const progresso=progSnap.docs.map(d=>d.data().texto).join("<br>");
 const materiais=matSnap.docs.map(d=>`<a href='${d.data().url}' target='_blank'>📎 ${d.data().nome}</a>`).join("<br>");

 document.getElementById("dadosAluno").innerHTML=`
 <div class='card'><h3>📊 Progresso</h3>${progresso}</div>
 <div class='card'><h3>📂 Materiais</h3>${materiais}</div>`;
}

function trocarSenha(){
 const nova=novaSenha.value;
 if(nova.length<8){alert("mínimo 8 caracteres");return}

 usuario.updatePassword(nova).then(async ()=>{
  await db.collection("usuarios").doc(usuario.uid).update({precisaTrocarSenha:false});
  precisaTrocarSenha=false;
  render();
 });
}

function render(){
 const app=document.getElementById("app");

 if(tela==="login"){
 app.innerHTML=`
 <div style="position:relative">
 <img class="banner" src="https://images.unsplash.com/photo-1588072432836-e10032774350">
 <div class="login-popup">
 <input id="user" placeholder="Email">
 <input id="pass" type="password" placeholder="Senha">
 <button class="btn primary" onclick="login()">Entrar</button>
 <button class="btn" onclick="tela='recuperar';render()">Esqueci senha</button>
 </div></div>`;
 return;
 }

 if(tela==="recuperar"){
 app.innerHTML=`
 <div class="container"><div class="card">
 <input id="emailRec" placeholder="Email">
 <button class="btn primary" onclick="recuperarSenha()">Enviar</button>
 <button class="btn secondary" onclick="tela='login';render()">Voltar</button>
 </div></div>`;
 return;
 }

 if(precisaTrocarSenha){
 app.innerHTML=`
 <div class="container"><div class="card">
 <h2>🔑 Trocar senha</h2>
 <input id="novaSenha" type="password">
 <button class="btn primary" onclick="trocarSenha()">Salvar</button>
 </div></div>`;
 return;
 }

 if(tipoUsuario==="prof"){
 app.innerHTML=`
 <div class="container">
 <button class="btn secondary" onclick="logout()">Sair</button>
 <div class="card">
 <h2>👩‍🏫 Professor</h2>
 <input id="nomeAluno" placeholder="Nome">
 <input id="classeAluno" placeholder="Turma">
 <input id="loginAluno" placeholder="Email">
 <button class="btn primary" onclick="cadastrarAluno()">Cadastrar</button>
 </div></div>`;
 return;
 }

 if(tipoUsuario==="aluno"){
 app.innerHTML=`
 <div class="container">
 <button class="btn secondary" onclick="logout()">Sair</button>
 <div id="dadosAluno"></div>
 <textarea id="progresso" placeholder="Registrar progresso"></textarea>
 <button class="btn primary" onclick="salvarProgresso()">Salvar progresso</button>
 <input type="file" id="arquivo">
 <button class="btn primary" onclick="uploadMaterial()">Enviar material</button>
 </div>`;

 carregarDadosAluno();
 }
}

auth.onAuthStateChanged(async u=>{
 if(u){
  usuario=u;
  const doc=await db.collection("usuarios").doc(u.uid).get();
  const data=doc.data();

  tipoUsuario=data?.tipo||"aluno";
  precisaTrocarSenha=data?.precisaTrocarSenha;
  tela="home";
 }else tela="login";
 render();
});

</script>
</body>
</html>
