<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Educacional Completo</title>

<style>
body{font-family:Arial;margin:0;background:#e3f2fd}
.header{background:#2196f3;color:#fff;padding:15px;text-align:center;font-weight:bold}
.banner{width:100%;height:100vh;object-fit:cover}
.login-popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:20px;width:280px}
.container{padding:15px}
.card{background:#fff;padding:15px;border-radius:20px;margin-bottom:15px}
.btn{padding:12px;border:none;border-radius:12px;width:100%;margin-top:8px}
.primary{background:#4caf50;color:#fff}
.secondary{background:#ff9800;color:#fff}
input,select,textarea{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ccc}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="header">📚 Portal Educacional</div>
<div id="app"></div>

<script>
const firebaseConfig = {
 apiKey:"AIzaSyB62sPHJ7TxqSAD0PXHHOktfQfs0Sv8FWs",
 authDomain:"portal-educacao-635cd.firebaseapp.com",
 projectId:"portal-educacao-635cd"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let tela="login";
let tipoUsuario=null;
let alunoAtual=null;

function login(){
 const email=user.value;
 const senha=pass.value;
 auth.signInWithEmailAndPassword(email,senha)
 .then(()=>{})
 .catch(e=>alert(e.message));
}

function logout(){auth.signOut();}

function recuperarSenha(){
 auth.sendPasswordResetEmail(emailRec.value)
 .then(()=>alert("Email enviado"))
 .catch(e=>alert(e.message));
}

async function cadastrarAluno(){
 const nome=nomeAluno.value;
 const classe=classeAluno.value;
 const email=loginAluno.value;
 const senha="12345678";

 await auth.createUserWithEmailAndPassword(email,senha);

 await db.collection("alunos").add({
  nome,classe,email,progresso:[],materiais:[]
 });

 alert("Aluno criado! Senha padrão: 12345678");
}

async function carregarAlunos(){
 const snap=await db.collection("alunos").get();
 return snap.docs.map(d=>({id:d.id,...d.data()}));
}

function render(){
 const app=document.getElementById("app");

 if(tela==="login"){
 app.innerHTML=`
 <div style="position:relative">
 <img class="banner" src="https://images.unsplash.com/photo-1588072432836-e10032774350">
 <div class="login-popup">
 <h3>🔐 Login</h3>
 <input id="user" placeholder="Email">
 <input id="pass" type="password" placeholder="Senha">
 <button class="btn primary" onclick="login()">Entrar</button>
 <button class="btn" onclick="tela='recuperar';render()">Esqueci senha</button>
 </div>
 </div>`;
 return;
 }

 if(tela==="recuperar"){
 app.innerHTML=`
 <div class="container">
 <div class="card">
 <h2>Recuperar senha</h2>
 <input id="emailRec" placeholder="Email">
 <button class="btn primary" onclick="recuperarSenha()">Enviar</button>
 <button class="btn secondary" onclick="tela='login';render()">Voltar</button>
 </div></div>`;
 return;
 }

 if(tipoUsuario==="prof"){
 app.innerHTML=`
 <div class="container">
 <button class="btn secondary" onclick="logout()">Sair</button>
 <div class="card">
 <h2>👩‍🏫 Professor</h2>
 
 <h3>➕ Cadastrar aluno</h3>
 <input id="nomeAluno" placeholder="Nome">
 <input id="classeAluno" placeholder="Turma">
 <input id="loginAluno" placeholder="Email do aluno">
 <button class="btn primary" onclick="cadastrarAluno()">Cadastrar</button>
 
 <h3>📂 Alunos</h3>
 <div id="lista"></div>
 </div>
 </div>`;

 carregarAlunos().then(alunos=>{
 document.getElementById("lista").innerHTML=
 alunos.map(a=>`<div class='card'>${a.nome} - ${a.classe}</div>`).join("");
 });

 return;
 }

 if(tipoUsuario==="aluno"){
 app.innerHTML=`
 <div class="container">
 <button class="btn secondary" onclick="logout()">Sair</button>
 <div class="card">
 <h2>👨‍👩‍👧 Área da Família</h2>
 <p>Visualizar progresso e materiais</p>
 </div>
 </div>`;
 }
}

auth.onAuthStateChanged(async user=>{
 if(user){
 if(user.email==="prof@escola.com") tipoUsuario="prof";
 else tipoUsuario="aluno";
 tela="home";
 }
 else tela="login";
 render();
});

</script>
</body>
</html>
