<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portal Escolar PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#f5f7fb}
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:#1e293b;color:#fff;padding:15px}
.sidebar button{display:block;width:100%;margin:5px 0;padding:10px;border:none;background:#334155;color:#fff;border-radius:8px;cursor:pointer}
.content{flex:1;padding:20px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
.btn{padding:10px;border:none;border-radius:8px;margin-top:5px;cursor:pointer}
.primary{background:#22c55e;color:#fff}
.secondary{background:#f59e0b;color:#fff}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div id="app"></div>

<script>
const firebaseConfig = {
 apiKey: "SUA_API_KEY",
 authDomain: "SEU_DOMINIO",
 projectId: "SEU_PROJECT_ID",
 storageBucket: "SEU_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let usuario=null;
let tipoUsuario=null;
let aba="dashboard";

// LOGIN
function login(){
 const email=document.getElementById("email").value;
 const senha=document.getElementById("senha").value;

 auth.signInWithEmailAndPassword(email,senha)
 .catch(e=>alert(e.message));
}

// REGISTRO
async function registrar(){
 const email=document.getElementById("email").value;
 const senha=document.getElementById("senha").value;

 const cred = await auth.createUserWithEmailAndPassword(email,senha);

 const adminCheck = await db.collection("usuarios").where("tipo","==","admin").get();
 const tipo = adminCheck.empty ? "admin" : "aluno";

 await db.collection("usuarios").doc(cred.user.uid).set({
  email,
  tipo
 });

 tipoUsuario = tipo;
 usuario = cred.user;

 render();
}

// LOGOUT
function logout(){
 auth.signOut();
}

// MENU
function menu(){
 return `
 <div class="sidebar">
 <h3>Portal</h3>
 <button onclick="trocar('dashboard')">Dashboard</button>
 <button onclick="logout()">Sair</button>
 </div>`;
}

// TROCAR
function trocar(n){
 aba=n;
 render();
}

// DASHBOARD
async function dashboard(){
 const snap = await db.collection("progresso").get();

 return `
 <div class="card">
 <h3>Total: ${snap.size}</h3>
 <canvas id="grafico"></canvas>
 </div>`;
}

// RENDER
async function render(){
 const app=document.getElementById("app");

 if(!usuario){
 app.innerHTML=`
 <div style="padding:20px">
 <div class="card">
 <h2>Login</h2>
 <input id="email" placeholder="Email"><br>
 <input id="senha" type="password" placeholder="Senha"><br>
 <button class="btn primary" onclick="login()">Entrar</button>
 <button class="btn secondary" onclick="registrar()">Criar Conta</button>
 </div>
 </div>`;
 return;
 }

 let conteudo = await dashboard();

 app.innerHTML=`
 <div class="layout">
 ${menu()}
 <div class="content">
 ${conteudo}
 </div>
 </div>`;

 const snap = await db.collection("progresso").get();

 new Chart(document.getElementById("grafico"),{
 type:"bar",
 data:{labels:["Progresso"],datasets:[{data:[snap.size]}]}
 });
}

// AUTH
auth.onAuthStateChanged(async u=>{
 if(u){
  usuario=u;

  const doc = await db.collection("usuarios").doc(u.uid).get();
  tipoUsuario = doc.exists ? doc.data().tipo : null;

 }else{
  usuario=null;
 }

 render();
});
</script>

</body>
</html>
